groups:
  - name: basic-alerts
    rules:

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance)(irate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 80
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% for more than 1 minute."

      - alert: HighDiskUsage
        expr: (node_filesystem_size_bytes{fstype!="tmpfs"} - node_filesystem_free_bytes{fstype!="tmpfs"}) 
              / node_filesystem_size_bytes{fstype!="tmpfs"} * 100 > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High Disk usage detected"
          description: "Disk usage is above 85%."

      - alert: TargetDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Target is down"
          description: "One of the monitored targets is not responding."
